apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fcs.name" . }}
  labels:
    {{- include "fcs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fcs.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "fcs.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: {{ include "fcs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "fcs.name" . }}-config
            - secretRef:
                name: {{ include "fcs.name" . }}-secrets
          # Liveness: process up, no DB (a DB blip must not restart pods).
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
              httpHeaders:
                - name: Host
                  value: localhost   # satisfies a strict ALLOWED_HOSTS
            initialDelaySeconds: 10
            periodSeconds: 15
          # Readiness: checks the DB; pod pulled from Service on a DB blip.
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.targetPort }}
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # static is pre-collected; only /tmp is writable
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
