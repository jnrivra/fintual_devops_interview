# Skeleton Secret. In production replace with ExternalSecrets/SealedSecrets and
# remove `secrets:` from values.yaml so plaintext never lands in the release.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fcs.name" . }}-secrets
  labels:
    {{- include "fcs.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
