apiVersion: v1
kind: Secret
metadata:
  name: fintual-content-service-secrets
  labels:
    app: fintual-content-service
type: Opaque
stringData:
  # Generate: python -c "from django.core.management.utils import get_random_secret_key as k; print(k())"
  DJANGO_SECRET_KEY: "replace-me-with-a-50-char-random-string"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/backend_devops_interview"
