apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fintual-content-service
  labels:
    app: fintual-content-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fintual-content-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 min before scaling down to avoid flapping
